  name: whisparr-config-v1
  namespace: organizers
  labels:
    snapshot.home.arpa/enabled: "true"
spec:
  accessModes:
    - ReadWriteOnce

  resources:
    requests:
      storage: 10Gi

# storageClassName: longhorn
  storageClassName: ceph-block
