---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: stash-config-v1
  namespace: media
spec:
  accessModes:
    - ReadWriteOnce
  labels:
    app.kubernetes.io/name: &name stash
    app.kubernetes.io/instance: *name
    snapshot.home.arpa/enabled: "true"
  resources:
    requests:
      storage: 10Gi
  storageClassName: longhorn
