---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: stash-config-v1
  namespace: media
spec:
  accessModes:
    - ReadWriteOnce

  resources:
    requests:
      storage: 10Gi
  storageClassName: longhorn
