  name: nord
  namespace: vpn
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
#    name: mullvad-secret
    name: nord-secret
    creationPolicy: Owner
  dataFrom:
    - extract:
        # WIREGUARD_PRIVATE_KEY, WIREGUARD_ADDRESSES
#        key: mullvad
        key: nord
