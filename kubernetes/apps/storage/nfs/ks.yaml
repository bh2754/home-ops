---
apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
kind: Kustomization
metadata:
  name: cluster-apps-nfs
  namespace: flux-system
  labels:
    substitution.flux.home.arpa/enabled: "true"
spec:
  path: "./kubernetes/apps/storage/nfs"
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-kubernetes
  interval: 10m
  retryInterval: 1m
  timeout: 3m
