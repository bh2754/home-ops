---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: openbooks
  namespace: downloaders
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 1.2.1
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system

  values:
    image:
      repository: docker.io/evanbuss/openbooks
      tag: latest@sha256:3f2e59a75b68950d57cfec5dc2b1b31d6c6b02706097c70b5438499b59fbdea2

    args:
      - server
      - --dir
      - /books
      - --port
      - &port '8080'
      - --name
      - openbooks82937

    podSecurityContext:
      runAsUser: 568
      runAsGroup: 568
      fsGroup: 568
      fsGroupChangePolicy: "OnRootMismatch"
      supplementalGroups:
        - 65539

    service:
      main:
        ports:
          http:
            port: *port

    ingress:
      main:
        enabled: true
        ingressClassName: "nginx"
        annotations:
          cert-manager.io/cluster-issuer: "letsencrypt-production"
          hajimari.io/enable: "true"
          hajimari.io/icon: "book-open-outline"
        hosts:
          - host: &host openbooks.${SECRET_DOMAIN}
            paths:
              - path: /
        tls:
          - hosts:
              - *host
            secretName: "openbooks-tls"
    persistence:
      books:
        enabled: true
        type: nfs
        server: "${NFS_SERVER}"
        path: ${NFS_BOOKS}
        mountPath: /books

    resources:
      requests:
        cpu: 10m
        memory: 53M
      limits:
        memory: 53M
